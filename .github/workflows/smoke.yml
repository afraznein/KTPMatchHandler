# KTP Tier 1 — Build-time smoke for KTPMatchHandler
#
# Catches plugin-load regressions: missing native, wrong AMXX ABI,
# truncated build artifact, syntax error that compile.sh missed but the
# AMXX runtime rejects on load.
#
# Implementation lives in the reusable workflow at
# KTPInfrastructure/.github/workflows/smoke-callable.yml. This file is just
# the trigger + assertion configuration.
#
# See KTPInfrastructure/tests/smoke/README.md for the full design.

name: Tier 1 Smoke

on:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CHANGELOG.md'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  smoke:
    uses: ${{ github.repository_owner }}/KTPInfrastructure/.github/workflows/smoke-callable.yml@main
    with:
      under_test_label: KTPMatchHandler
      under_test_kind: amx_plugin
      amxx_source: KTPMatchHandler.sma
      artifact_container_path: /opt/hlds/dod/addons/ktpamx/plugins/KTPMatchHandler.amxx
      assert_plugin: KTPMatchHandler
    secrets:
      ktp_checkout_token: ${{ secrets.KTP_CHECKOUT_TOKEN }}
